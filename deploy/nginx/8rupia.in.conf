# /etc/nginx/sites-available/8rupia.in
# Server block for 8rupia.in — does NOT touch vidyt.com or aapkaplot.com.
# After placing this file:
#   sudo ln -s /etc/nginx/sites-available/8rupia.in /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot to add SSL:
#   sudo certbot --nginx -d 8rupia.in -d www.8rupia.in

# HTTP — used only for ACME challenge + redirect to HTTPS once certbot runs
server {
    listen 80;
    listen [::]:80;
    server_name 8rupia.in www.8rupia.in;

    # Let certbot place ACME challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS vhost — certbot will inject the cert paths automatically.
# Until certbot runs, comment this server block out OR run only on :80.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 8rupia.in www.8rupia.in;

    # ssl_certificate     /etc/letsencrypt/live/8rupia.in/fullchain.pem;   # certbot adds these
    # ssl_certificate_key /etc/letsencrypt/live/8rupia.in/privkey.pem;     # certbot adds these
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs (per-site, won't clobber other vhosts)
    access_log /var/log/nginx/8rupia.in.access.log;
    error_log  /var/log/nginx/8rupia.in.error.log;

    # Body size limits — admin can upload up to 200 MB PDFs
    client_max_body_size 220m;
    # Long-running AI calls (predict-pyq can take 30-60 sec)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    send_timeout 120s;

    # Static assets cache hint (Next handles its own /_next/static caching)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:8021;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Brand assets in /public
    location ~* ^/(brand-logo\.png|favicon\.ico|icon\.svg|sw\.js|manifest\.webmanifest|robots\.txt|sitemap\.xml) {
        proxy_pass http://127.0.0.1:8021;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # All other traffic → Next.js on internal port
    location / {
        proxy_pass http://127.0.0.1:8021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
