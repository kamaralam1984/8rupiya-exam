name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rupia
          POSTGRES_PASSWORD: rupia
          POSTGRES_DB: rupia
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rupia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://rupia:rupia@localhost:5432/rupia
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-secret-must-be-32-chars-or-longer-yes
      OPENAI_API_KEY: sk-test-not-used-during-ci
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint --if-present
      - run: npm run typecheck
      - run: npm run build
