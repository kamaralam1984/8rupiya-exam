services:
  postgres:
    image: postgres:16-alpine
    container_name: 8rupia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rupia
      POSTGRES_USER: rupia
      # CHANGE THIS in .env.production / via .env file before deploying
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rupia}
    # Bind to localhost only — no public exposure on VPS
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rupia -d rupia"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: 8rupia-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:56379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
